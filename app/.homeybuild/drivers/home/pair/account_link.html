<style>
  #status {
    margin-top: 16px;
    text-align: center;
    color: var(--homey-text-color-light);
  }
</style>

<header class="homey-header">
  <h1 class="homey-title" data-i18n="pair.account_link.title">Link your account</h1>
</header>

<p data-i18n="pair.account_link.body">
  Sign in to your Octopus Energy account and authorize access. This screen
  continues automatically once you have completed authorization.
</p>

<button id="linkButton" class="homey-button-primary-full" style="margin-top: 16px;" disabled>
  Sign in to Octopus Energy
</button>

<p id="status"></p>

<script type="text/javascript">
  var authUrl = null;
  var linkButton = document.getElementById('linkButton');
  var status = document.getElementById('status');

  function setAuthUrl(url) {
    if (!url || authUrl) return;
    authUrl = url;
    linkButton.disabled = false;
  }

  // The app provides Homey's OAuth2 callback URL via get_account_link. It is set
  // just after the loading view, so poll briefly until it is available.
  function pollUrl(attempt) {
    Homey.emit('get_account_link').then(function (url) {
      if (url) {
        setAuthUrl(url);
      } else if (attempt < 20) {
        setTimeout(function () { pollUrl(attempt + 1); }, 250);
      }
    }).catch(function (err) {
      console.error('get_account_link failed', err);
    });
  }
  pollUrl(0);

  // The app advances the wizard automatically once the code is exchanged; this
  // is just for feedback if the user returns to this screen.
  Homey.on('authorized', function () {
    status.textContent = 'Authorized — loading your account…';
  });
  Homey.on('auth_failed', function (msg) {
    status.textContent = 'Authorization failed: ' + msg + ' — tap Sign in to try again.';
  });

  linkButton.addEventListener('click', function () {
    if (authUrl) {
      Homey.popup(authUrl);
      status.textContent = 'Waiting for authorization…';
    }
  });
</script>
