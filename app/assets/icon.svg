    <title id="title-constantine">Constantine the Octopus</title>
    <!--
      Homey renders app/device icons as a single-color alpha MASK: every opaque
      area is painted in the theme colour, transparent areas stay empty. So this
      icon is one solid silhouette with the eyes punched out as transparent holes
      (fill-rule evenodd) and the pupils drawn back in on top. Colour is irrelevant
      (masked) — kept black so it also reads on a light background if shown un-masked.
    -->
