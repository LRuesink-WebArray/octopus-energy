<style>
  select {
    width: 100%;
    margin-top: 8px;
  }
  #button {
    margin-top: 16px;
  }
</style>

<header class="homey-header">
  <h1 class="homey-title" data-i18n="pair.region_select.title">Select your country</h1>
</header>

<p data-i18n="pair.region_select.body">Choose the country your Octopus Energy account is registered in.</p>

<select id="regionSelect">
  <option value="DE">Germany</option>
</select>

<button id="continueButton" class="homey-button-primary-full" style="margin-top: 16px;">
  Continue
</button>

<script type="text/javascript">
  document.getElementById('continueButton').addEventListener('click', function () {
    var region = document.getElementById('regionSelect').value;
    Homey.emit('region_selected', region, function () {
      Homey.nextView();
    });
  });
</script>
